name: orangelab
runtime:
    name: nodejs
    options:
        typescript: true
        packagemanager: npm
description: Private infrastructure for cloud natives
config:
    # Below is list of all settings with default values.
    # Do NOT modify this file but add overrides in your Pulumi.<stack>.yaml.

    # Common settings supported by apps at ./docs/configuration.md

    ### SYSTEM ###

    # k3s:serverIp: localhost
    # k3s:agentToken: K3S_TOKEN
    k3s:clusterCidr: 10.42.0.0/16
    k3s:serviceCidr: 10.43.0.0/16

    tailscale:enabled: false
    # tailscale:tailnet: <*.ts.net>
    # tailscale:oauthClientId: OAUTH_CLIENT_ID
    # tailscale:oauthClientSecret:
    #   secure: OAUTH_CLIENT_SECRET
    # Hostname for Tailscale operator proxy for Kubernetes API
    tailscale:hostname: k8s

    orangelab:routingProvider: tailscale # tailscale | traefik
    # Note: add A record for "*" pointing to one of your Tailscale IPs
    # Custom domain supported by Traefik provider only.
    # orangelab:customDomain: 'example.com'

    # Global Redis image - apps can override with <app>:redis/image
    orangelab:redis/image: docker.io/redis:8-alpine

    traefik:enabled: false
    traefik:hostname: traefik
    traefik:gatewayApiCrdUrl: 'https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.4.0/experimental-install.yaml'

    longhorn:enabled: false
    longhorn:version: 1.11.0
    longhorn:hostname: longhorn
    # Initial value for default storage. Adjust each volume in Longhorn UI
    longhorn:replicaCount: 2
    longhorn:snapshotEnabled: false
    longhorn:snapshotCron: '0 * * * *' # every hour
    longhorn:trimEnabled: true
    longhorn:trimCron: '0 0 * * 0' # once a week on Sunday at midnight
    longhorn:backupEnabled: false
    longhorn:backupBucket: backup-longhorn
    longhorn:backupCron: '15 0 * * *' # daily at 0:15
    # Full backup every x days, use 0 for incremental only
    longhorn:backupFullInterval: '14'
    # Set to "least-effort" or "best-effort" to move replicas when nodes become unavailable
    longhorn:replicaAutoBalance: disabled
    longhorn:backupAllVolumes: false

    minio:enabled: false
    minio:hostname: minio
    minio:hostname-api: minio-api
    # minio:dataPath: /mnt/my-drive/minio-data
    minio:storageSize: 2000Gi
    minio:rootUser: minioadmin
    minio:image: quay.io/minio/minio:latest
    minio:provisioner/image: minio/mc:latest
    # minio:requiredNodeLabel: kubernetes.io/hostname=<hostname>

    rustfs:enabled: false
    rustfs:hostname: rustfs
    rustfs:hostname-api: rustfs-api
    # rustfs:dataPath: /mnt/my-drive/rustfs-data
    rustfs:storageSize: 2000Gi
    # rustfs:requiredNodeLabel: kubernetes.io/hostname=<hostname>
    rustfs:rootUser: admin
    rustfs:image: rustfs/rustfs:1.0.0-alpha.85
    rustfs:provisioner/image: rustfs/rc:v0.1.3

    cert-manager:enabled: false
    cert-manager:clusterIssuer: letsencrypt-issuer

    technitium:enabled: false
    technitium:image: technitium/dns-server:14.3.0
    technitium:hostname: dns
    technitium:storageSize: 5Gi
    # set to empty to use root servers recursion
    technitium:DNS_SERVER_FORWARDERS: '1.1.1.1'
    technitium:DNS_SERVER_FORWARDER_PROTOCOL: 'Udp' # Udp, Tcp, Tls, Https, HttpsJson
    # technitium:requiredNodeLabel: kubernetes.io/hostname=<hostname>

    nfd:enabled: false
    nfd:gpu-autodetect: true

    nvidia-gpu-operator:enabled: false

    amd-gpu-operator:enabled: false

    mariadb-operator:enabled: false

    cloudnative-pg:enabled: false
    # cloudnative-pg:version: 0.24.0

    debug:enabled: false
    # debug:namespace: bitcoin
    # debug:fromVolume: bitcoin
    # debug:requiredNodeLabel: orangelab/bitcoin
    # debug:exportPath: /orange-lab/export

    ### Monitoring ###

    prometheus:enabled: false
    # prometheus:requiredNodeLabel: orangelab/prometheus=true
    prometheus:grafana/password: admin
    prometheus:hostname: prometheus
    prometheus:alertmanager/hostname: alertmanager
    prometheus:grafana/hostname: grafana
    prometheus:storageSize: 100Gi
    prometheus:alertmanager/storageSize: 5Gi
    prometheus:grafana/storageSize: 10Gi
    # Additional monitoring for installed components that support it.
    # Only enable once Prometheus has been installed
    # This has to be disabled first before Prometheus can be removed
    prometheus:enableComponentMonitoring: false

    beszel:enabled: false
    # beszel:hubKey: BESZEL_KEY
    beszel:hostname: beszel
    beszel:image: henrygd/beszel:latest
    beszel:agent/image: henrygd/beszel-agent:latest
    beszel:storageSize: 5Gi
    beszel:storageOnly: false

    ### IoT ###

    home-assistant:enabled: false
    home-assistant:hostname: home-assistant
    home-assistant:storageSize: 5Gi
    # Set zone for deployment on nodes with topology.kubernetes.io/zone=<value> label
    # This gives access to sensors on local host network
    # home-assistant:requiredNodeLabel: topology.kubernetes.io/zone=<value>

    ### AI ###

    ollama:enabled: false
    ollama:hostname: ollama
    ollama:storageSize: 50Gi
    ollama:storageOnly: false
    # ollama:fromVolume: ollama
    # Set to 'nvidia' or 'amd' to enable GPU support, Use '' for CPU-only mode
    ollama:gpu: nvidia
    # Override GPU version for AMD ROCm compatibility (ollama:gpu=amd)
    # ollama:HSA_OVERRIDE_GFX_VERSION: "11.0.2"
    # ollama:HCC_AMDGPU_TARGETS: "gfx1103"
    # ollama:models: qwen2.5-coder:1.5b,glm-4.7-flash
    # "-1" = keep models loaded indefinitely, "30m" unload after 30 minutes of inactivity
    ollama:OLLAMA_KEEP_ALIVE: '-1'
    # LLM parameter tuning
    ollama:OLLAMA_CONTEXT_LENGTH: '16536'

    automatic1111:enabled: false
    automatic1111:hostname: 'automatic1111'
    automatic1111:image: universonic/stable-diffusion-webui:full
    automatic1111:cliArgs: '--lowvram'
    automatic1111:storageSize: 20Gi
    automatic1111:storageOnly: false
    automatic1111:gpu: nvidia

    sdnext:enabled: false
    sdnext:hostname: 'sdnext'
    sdnext:image: saladtechnologies/sdnext:base
    sdnext:cliArgs: '--lowvram'
    sdnext:storageSize: 20Gi
    sdnext:storageOnly: false
    sdnext:gpu: nvidia

    open-webui:enabled: false
    open-webui:hostname: webui
    open-webui:storageSize: 5Gi
    open-webui:DEFAULT_USER_ROLE: admin
    open-webui:image: ghcr.io/open-webui/open-webui:main-slim

    kubeai:enabled: false
    kubeai:hostname: kubeai
    # kubeai:huggingfaceToken: TOKEN
    # Comma-separated list of models from https://github.com/substratusai/kubeai/blob/main/charts/models/values.yaml
    # <model>/<profile>/<replicas>
    kubeai:models: qwen2.5-coder-1.5b-rtx4070-8gb/nvidia,faster-whisper-medium-en-cpu,gemma2-2b-cpu/amd/0
    # kubeai:HSA_OVERRIDE_GFX_VERSION: '11.0.2'
    # kubeai:HCC_AMDGPU_TARGETS: 'gfx1103'

    invokeai:enabled: false
    invokeai:hostname: 'invokeai'
    invokeai:image: ghcr.io/invoke-ai/invokeai:latest
    # invokeai:image: ghcr.io/invoke-ai/invokeai:main-rocm  # AMD ROCm
    invokeai:storageSize: 20Gi
    invokeai:gpu: nvidia
    # invokeai:huggingfaceToken: TOKEN

    n8n:enabled: false
    n8n:hostname: n8n
    n8n:image: docker.n8n.io/n8nio/n8n:latest
    # n8n:N8N_ENCRYPTION_KEY: ''
    n8n:storageSize: 1Gi
    n8n:db/storageSize: 1Gi
    n8n:db/instances: 1

    ### Bitcoin ###

    # Default RPC users that will be created (comma-separated)
    bitcoin:rpcUsers: admin,electrs,mempool

    bitcoin-core:enabled: false
    bitcoin-core:hostname: bitcoin
    bitcoin-core:storageSize: 1000Gi
    bitcoin-core:prune: 0
    bitcoin-core:image: btcpayserver/bitcoin:29.0
    bitcoin-core:commandArgs: bitcoind
    bitcoin-core:volumePath: /data
    # bitcoin-core:requiredNodeLabel: kubernetes.io/hostname=<hostname>

    bitcoin-knots:enabled: false
    bitcoin-knots:hostname: bitcoin
    bitcoin-knots:storageSize: 1000Gi
    bitcoin-knots:prune: 0
    bitcoin-knots:image: btcpayserver/bitcoinknots:29.2.knots20251110
    bitcoin-knots:commandArgs: bitcoind
    bitcoin-knots:volumePath: /data
    # bitcoin-knots:requiredNodeLabel: kubernetes.io/hostname=<hostname>

    electrs:enabled: false
    electrs:storageSize: 200Gi
    electrs:hostname: electrs
    electrs:image: getumbrel/electrs:v0.11.0
    # electrs:requiredNodeLabel: kubernetes.io/hostname=<hostname>

    mempool:enabled: false
    mempool:frontend/hostname: mempool
    mempool:frontend/image: mempool/frontend:v3.2.1
    mempool:backend/hostname: mempool-backend
    mempool:backend/image: mempool/backend:v3.2.1
    mempool:db/storageSize: 1Gi

    ### Media ###

    immich:enabled: false
    immich:hostname: immich
    immich:image: ghcr.io/immich-app/immich-server:release
    immich:storageSize: 50Gi
    immich:machine-learning/enabled: false
    immich:machine-learning/image: ghcr.io/immich-app/immich-machine-learning:release
    immich:machine-learning/storageSize: 10Gi
    # immich:machine-learning/requiredNodeLabel: kubernetes.io/hostname=<hostname>
    # immich:machine-learning/gpu: nvidia  # Enable GPU acceleration (nvidia or amd)
    immich:redis/image: docker.io/valkey/valkey:9@sha256:546304417feac0874c3dd576e0952c6bb8f06bb4093ea0c9ca303c73cf458f63
    immich:db/storageSize: 5Gi
    immich:db/image: ghcr.io/tensorchord/cloudnative-vectorchord:18.2
    immich:db/sharedPreloadLibraries: vchord.so
    immich:db/postInitApplicationSQL: CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE,CREATE EXTENSION IF NOT EXISTS vchord CASCADE

    ### Office ###

    nextcloud:enabled: false
    nextcloud:hostname: nextcloud
    nextcloud:storageSize: 20Gi
    nextcloud:db/storageSize: 5Gi

    ### Security ###

    vaultwarden:enabled: false
    vaultwarden:hostname: vaultwarden
    vaultwarden:storageSize: 5Gi
    # vaultwarden:adminToken:
    #   secure: <ADMIN_TOKEN>
    # vaultwarden:smtp/host: smtp.example.com
    # vaultwarden:smtp/from: noreply@example.com
    # vaultwarden:smtp/username: user
    # vaultwarden:smtp/password:
    #   secure: <SMTP_PASSWORD>
    vaultwarden:smtp/port: 587
    vaultwarden:signupsAllowed: false
    vaultwarden:signupsVerify: true
