name: orangelab
runtime:
    name: nodejs
    options:
        typescript: true
        packagemanager: npm
description: Private distributed self-hosting infrastructure
config:
    # Below is list of all settings with default values.
    # Do NOT modify this file but add overrides in your Pulumi.<stack>.yaml.

    # Common settings supported by apps at ./docs/configuration.md

    ### SYSTEM ###

    # k3s:serverIp: localhost
    # k3s:agentToken: K3S_TOKEN
    k3s:clusterCidr: 10.42.0.0/16
    k3s:serviceCidr: 10.43.0.0/16

    orangelab:routingProvider: tailscale # tailscale | traefik
    # Custom domain supported by Traefik provider only.
    # Note: add A record for "*" pointing to one of your Tailscale IPs
    # orangelab:customDomain: 'example.com'

    # Global defaults for storage classes. Apps can override with <app>:storageClass
    orangelab:storageClass: longhorn
    orangelab:postgres/storageClass: longhorn
    orangelab:mariadb/storageClass: longhorn
    # Global Redis image - apps can override with <app>:redis/image
    orangelab:redis/image: docker.io/redis:8-alpine

    ### Network ###

    tailscale:enabled: false
    # tailscale:tailnet: <*.ts.net>
    # tailscale:oauthClientId: OAUTH_CLIENT_ID
    # tailscale:oauthClientSecret:
    #   secure: OAUTH_CLIENT_SECRET
    # Hostname for Tailscale operator proxy for Kubernetes API
    tailscale:hostname: k8s

    traefik:enabled: false
    traefik:version: 41.0.2
    traefik:hostname: traefik
    traefik:gatewayApiCrdUrl: 'https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.5.1/experimental-install.yaml'

    cert-manager:enabled: false
    cert-manager:version: v1.21.0
    cert-manager:clusterIssuer: letsencrypt-issuer

    technitium:enabled: false
    technitium:image: technitium/dns-server:15.3.0
    technitium:hostname: dns
    technitium:storageSize: 5Gi
    # set to empty to use root servers recursion
    technitium:DNS_SERVER_FORWARDERS: '1.1.1.1'
    technitium:DNS_SERVER_FORWARDER_PROTOCOL: 'Udp' # Udp, Tcp, Tls, Https, HttpsJson
    # technitium:requiredNodeLabel: kubernetes.io/hostname=<hostname>

    ### Storage ###

    longhorn:enabled: false
    longhorn:version: 1.12.0
    longhorn:hostname: longhorn
    # Initial value for default storage. Adjust each volume in Longhorn UI
    longhorn:replicaCount: 2
    longhorn:snapshotEnabled: false
    longhorn:snapshotCron: '0 * * * *' # every hour
    longhorn:trimEnabled: true
    longhorn:trimCron: '0 0 * * 0' # once a week on Sunday at midnight
    longhorn:backupEnabled: false
    longhorn:backupBucket: backup-longhorn
    longhorn:backupCron: '15 0 * * *' # daily at 0:15
    # Enable backups for all volumes. Apps can opt in/out individually with <app>:backupVolume: true/false.
    longhorn:backupAllVolumes: false
    # Full backup every x days, use 0 for incremental only
    longhorn:backupFullInterval: '14'
    # Set to "least-effort" or "best-effort" to move replicas when nodes become unavailable
    longhorn:replicaAutoBalance: disabled
    # Set to "best-effort" to create a local replica on the pod's node
    longhorn:dataLocality: disabled

    rustfs:enabled: false
    rustfs:hostname: rustfs
    rustfs:hostname-api: rustfs-api
    # rustfs:dataPath: /mnt/my-drive/rustfs-data
    # rustfs:requiredNodeLabel: kubernetes.io/hostname=<hostname>
    rustfs:rootUser: admin
    rustfs:image: rustfs/rustfs:1.0.0-beta.8
    rustfs:provisioner/image: rustfs/rc:latest

    ### Hardware ###

    nfd:enabled: false
    nfd:gpu-autodetect: true
    nfd:excludeNodeLabel: orangelab/alpine

    nvidia-gpu-operator:enabled: false
    nvidia-gpu-operator:version: v26.3.3

    amd-gpu-operator:enabled: false
    amd-gpu-operator:version: v1.5.0
    amd-gpu-operator:metricsExporter/image: docker.io/rocm/device-metrics-exporter:v1.5.0

    ### Data ###

    mariadb-operator:enabled: false

    cloudnative-pg:enabled: false
    cloudnative-pg:version: 0.29.0

    ### Monitoring ###

    prometheus:enabled: false
    #prometheus:requiredNodeLabel: node-role.kubernetes.io/prometheus=true
    prometheus:grafana/password: admin
    prometheus:hostname: prometheus
    prometheus:alertmanager/hostname: alertmanager
    prometheus:grafana/hostname: grafana
    prometheus:storageSize: 100Gi
    prometheus:alertmanager/storageSize: 5Gi
    prometheus:grafana/storageSize: 10Gi
    # Additional monitoring for installed components that support it.
    # Only enable once Prometheus has been installed
    # This has to be disabled first before Prometheus can be removed
    prometheus:enableComponentMonitoring: false

    beszel:enabled: false
    # beszel:hubKey: BESZEL_KEY
    beszel:hostname: beszel
    beszel:image: henrygd/beszel:latest
    beszel:agent/image: henrygd/beszel-agent:latest
    # Deploy to all nodes by default, even if requiredNodeLabel used on beszel
    beszel:agent/requiredNodeLabel: ''
    beszel:storageSize: 5Gi
    beszel:storageOnly: false
