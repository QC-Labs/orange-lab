name: orangelab-ai
main: index.ts
runtime:
    name: nodejs
    options:
        typescript: true
        packagemanager: npm
description: OrangeLab AI Stack
config:
    # Required shared defaults (duplicated from root Pulumi.yaml)
    # orangelab:routingProvider: tailscale | traefik
    # orangelab:customDomain: 'example.com'
    prometheus:enabled: false
    prometheus:enableComponentMonitoring: false
    cloudnative-pg:enabled: false

    ollama:enabled: false
    ollama:hostname: ollama
    ollama:storageSize: 50Gi
    ollama:storageOnly: false
    ollama:storageClass: longhorn-gpu
    # Set to 'nvidia' or 'amd' to enable GPU support, Use '' for CPU-only mode
    ollama:gpu: nvidia
    # ollama:HSA_OVERRIDE_GFX_VERSION: "11.0.2"
    # ollama:HCC_AMDGPU_TARGETS: "gfx1103"
    # ollama:models: qwen2.5-coder:1.5b,glm-4.7-flash
    # "-1" = keep models loaded indefinitely, "30m" unload after 30 minutes of inactivity
    ollama:OLLAMA_KEEP_ALIVE: '-1'
    # LLM parameter tuning
    ollama:OLLAMA_CONTEXT_LENGTH: '8192'
    # ollama:OLLAMA_FLASH_ATTENTION: 'true'
    # ollama:OLLAMA_KV_CACHE_TYPE: 'q8_0' # f16, q8_0, q4_0
    # Enable if ollama drops integrated GPU (iGPU). Set to "1" to use iGPU
    # ollama:OLLAMA_IGPU_ENABLE: "1"
    # Deploys to any node with selected GPU if requiredNodeLabel NOT specified
    # ollama:requiredNodeLabel: kubernetes.io/hostname=<host>

    automatic1111:enabled: false
    automatic1111:hostname: 'automatic1111'
    automatic1111:image: universonic/stable-diffusion-webui:full
    automatic1111:cliArgs: '--lowvram'
    automatic1111:storageSize: 20Gi
    automatic1111:storageOnly: false
    automatic1111:storageClass: longhorn-gpu
    automatic1111:gpu: nvidia

    sdnext:enabled: false
    sdnext:hostname: 'sdnext'
    sdnext:image: saladtechnologies/sdnext:base
    sdnext:cliArgs: '--lowvram'
    sdnext:storageSize: 20Gi
    sdnext:storageOnly: false
    sdnext:storageClass: longhorn-gpu
    sdnext:gpu: nvidia

    open-webui:enabled: false
    open-webui:hostname: webui
    open-webui:storageSize: 5Gi
    open-webui:DEFAULT_USER_ROLE: admin
    open-webui:image: ghcr.io/open-webui/open-webui:main-slim

    kubeai:enabled: false
    kubeai:hostname: kubeai
    # kubeai:huggingfaceToken: TOKEN
    # Comma-separated list of models from https://github.com/substratusai/kubeai/blob/main/charts/models/values.yaml
    # <model>/<profile>/<replicas>
    kubeai:models: qwen2.5-coder-1.5b-rtx4070-8gb/nvidia,faster-whisper-medium-en-cpu,gemma2-2b-cpu/amd/0
    # kubeai:HSA_OVERRIDE_GFX_VERSION: '11.0.2'
    # kubeai:HCC_AMDGPU_TARGETS: 'gfx1103'

    invokeai:enabled: false
    invokeai:hostname: 'invokeai'
    invokeai:image: ghcr.io/invoke-ai/invokeai:latest
    # invokeai:image: ghcr.io/invoke-ai/invokeai:main-rocm  # AMD ROCm
    invokeai:storageSize: 20Gi
    invokeai:storageClass: longhorn-gpu
    invokeai:gpu: nvidia
    # invokeai:huggingfaceToken: TOKEN

    n8n:enabled: false
    n8n:hostname: n8n
    n8n:image: docker.n8n.io/n8nio/n8n:latest
    # n8n:N8N_ENCRYPTION_KEY: ''
    n8n:storageSize: 1Gi
    n8n:db/storageSize: 1Gi
    n8n:db/instances: 1
