name: orangelab-bitcoin
main: index.ts
runtime:
    name: nodejs
    options:
        typescript: true
        packagemanager: npm
description: OrangeLab Bitcoin Stack
config:
    # Required shared defaults (duplicated from root Pulumi.yaml)
    # orangelab:routingProvider: tailscale | traefik
    # orangelab:customDomain: 'example.com'
    mariadb-operator:enabled: false

    # Default RPC users that will be created (comma-separated)
    bitcoin:rpcUsers: admin,electrs,mempool

    bitcoin-core:enabled: false
    bitcoin-core:hostname: bitcoin
    bitcoin-core:storageSize: 1000Gi
    bitcoin-core:storageClass: longhorn-large
    bitcoin-core:prune: 0
    bitcoin-core:image: btcpayserver/bitcoin:29.0
    bitcoin-core:commandArgs: bitcoind -datadir=/data -conf=/conf/bitcoin.conf
    bitcoin-core:volumePath: /data
    # (Optional) Override image ENTRYPOINT and set container user; required for non-btcpayserver images
    # bitcoin-core:command: bitcoind
    # bitcoin-core:runAsUser: 1000
    # bitcoin-core:volumeOwnerUserId: 1000

    bitcoin-knots:enabled: false
    bitcoin-knots:hostname: bitcoin
    bitcoin-knots:storageSize: 1000Gi
    bitcoin-knots:storageClass: longhorn-large
    bitcoin-knots:prune: 0
    bitcoin-knots:image: btcpayserver/bitcoinknots:29.3.knots20260508@sha256:cb580f0b85e8617b0b177b5368808dc668a4353fd4d47caa703e8b5ce94e2fcb
    bitcoin-knots:commandArgs: bitcoind -datadir=/data -conf=/conf/bitcoin.conf -consensusrules=rdts
    bitcoin-knots:volumePath: /data
    # (Optional) Override image ENTRYPOINT and set container user; required for non-btcpayserver images
    # bitcoin-knots:command: bitcoind
    # bitcoin-knots:runAsUser: 1000
    # bitcoin-knots:volumeOwnerUserId: 1000

    electrs:enabled: false
    electrs:storageSize: 200Gi
    electrs:storageClass: longhorn-large
    electrs:hostname: electrs
    electrs:image: getumbrel/electrs:v0.11.0

    mempool:enabled: false
    mempool:frontend/hostname: mempool
    mempool:frontend/image: mempool/frontend:v3.2.1
    mempool:backend/hostname: mempool-backend
    mempool:backend/image: mempool/backend:v3.2.1
    mempool:db/storageSize: 1Gi
