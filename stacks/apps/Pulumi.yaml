name: orangelab-apps
main: index.ts
runtime:
    name: nodejs
    options:
        typescript: true
        packagemanager: npm
description: OrangeLab Apps Stack
config:
    # Required shared defaults (duplicated from root Pulumi.yaml)
    # orangelab:routingProvider: tailscale | traefik
    # orangelab:customDomain: 'example.com'

    ### Security ###

    vaultwarden:enabled: false
    vaultwarden:hostname: vaultwarden
    vaultwarden:storageSize: 5Gi
    # vaultwarden:adminToken:
    #   secure: <ADMIN_TOKEN>
    # vaultwarden:smtp/host: smtp.example.com
    # vaultwarden:smtp/from: noreply@example.com
    # vaultwarden:smtp/username: user
    # vaultwarden:smtp/password:
    #   secure: <SMTP_PASSWORD>
    vaultwarden:smtp/port: 587
    vaultwarden:signupsAllowed: false
    vaultwarden:signupsVerify: true
